# =============================================================================
# AICQ — Build & Release CI/CD
# Triggers on push tag (v*) to build all platforms and create GitHub Release.
# =============================================================================
name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build Web Client
  # ---------------------------------------------------------------------------
  build-web:
    name: Build Web Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/web/package-lock.json

      - name: Install shared crypto
        run: cd shared/crypto && npm ci && npm run build

      - name: Install dependencies
        run: cd client/web && npm ci

      - name: Build
        run: cd client/web && npm run build

      - name: Archive web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: client/web/dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Build Android APK
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: client/web/dist/

      - name: Install mobile dependencies
        run: cd client/mobile && npm ci --legacy-peer-deps

      - name: Sync Capacitor
        run: cd client/mobile && npx cap sync android

      - name: Build Android APKs
        run: |
          cd client/mobile/android
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            client/mobile/android/app/build/outputs/apk/debug/*.apk
            client/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 7
        if: always()

  # ---------------------------------------------------------------------------
  # Job 3: Build Linux AppImage
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: client/web/dist/

      - name: Install Electron dependencies
        run: cd client/desktop && npm ci

      - name: Build Linux AppImage
        run: cd client/desktop && npx electron-builder --linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: client/dist-electron/AICQ-*.AppImage
          retention-days: 7
        if: always()

  # ---------------------------------------------------------------------------
  # Job 4: Build Windows EXE
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: client/web/dist/

      - name: Install Electron dependencies
        run: cd client/desktop && npm ci

      - name: Build Windows (NSIS + portable ZIP)
        run: cd client/desktop && npx electron-builder --win --x64

      - name: Create Windows portable ZIP
        shell: pwsh
        run: |
          if (Test-Path "client/dist-electron/win-unpacked") {
            Compress-Archive -Path "client/dist-electron/win-unpacked/*" -DestinationPath "client/dist-electron/AICQ-windows-x64.zip"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            client/dist-electron/AICQ-Setup-*.exe
            client/dist-electron/AICQ-windows-x64.zip
          retention-days: 7
        if: always()

  # ---------------------------------------------------------------------------
  # Job 5: Build macOS DMG (macOS runner only)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: client/web/dist/

      - name: Install Electron dependencies
        run: cd client/desktop && npm ci

      - name: Build macOS DMG
        run: cd client/desktop && npx electron-builder --mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: client/dist-electron/AICQ-*.dmg
          retention-days: 7
        if: always()

  # ---------------------------------------------------------------------------
  # Job 6: Create GitHub Release & Upload All Artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-web
      - build-android
      - build-linux
      - build-windows
      - build-macos
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Organize release files
        run: |
          mkdir -p final-artifacts
          VERSION="${{ steps.version.outputs.VERSION }}"
          HAS_FILES=false

          # Web
          if [ -d release-artifacts/web-dist ]; then
            (cd release-artifacts/web-dist && zip -r "../../final-artifacts/AICQ-${VERSION}-web.zip" .)
            HAS_FILES=true
          fi

          # Android
          if [ -d release-artifacts/android-apks ]; then
            cp release-artifacts/android-apks/debug/*.apk final-artifacts/ 2>/dev/null || true
            cp release-artifacts/android-apks/release/*.apk final-artifacts/ 2>/dev/null || true
            for f in final-artifacts/*.apk; do
              [ -f "$f" ] || continue
              if echo "$f" | grep -q "debug"; then
                mv "$f" "final-artifacts/AICQ-${VERSION}-android-debug.apk" 2>/dev/null || true
              elif echo "$f" | grep -q "release"; then
                mv "$f" "final-artifacts/AICQ-${VERSION}-android-release.apk" 2>/dev/null || true
              fi
            done
            [ "$(ls final-artifacts/*.apk 2>/dev/null)" ] && HAS_FILES=true
          fi

          # Linux
          if [ -d release-artifacts/linux-appimage ]; then
            cp release-artifacts/linux-appimage/*.AppImage final-artifacts/AICQ-${VERSION}-linux.AppImage 2>/dev/null || true
            [ -f "final-artifacts/AICQ-${VERSION}-linux.AppImage" ] && HAS_FILES=true
          fi

          # Windows
          if [ -d release-artifacts/windows-exe ]; then
            cp release-artifacts/windows-exe/*.exe final-artifacts/ 2>/dev/null || true
            cp release-artifacts/windows-exe/*.zip final-artifacts/AICQ-${VERSION}-windows-x64.zip 2>/dev/null || true
            [ "$(ls final-artifacts/*.exe 2>/dev/null)" ] && HAS_FILES=true
          fi

          # macOS
          if [ -d release-artifacts/macos-dmg ]; then
            cp release-artifacts/macos-dmg/*.dmg final-artifacts/AICQ-${VERSION}-mac.dmg 2>/dev/null || true
            [ -f "final-artifacts/AICQ-${VERSION}-mac.dmg" ] && HAS_FILES=true
          fi

          # Generate checksums
          (cd final-artifacts && sha256sum * > "AICQ-${VERSION}-checksums.txt" 2>/dev/null || true)

          echo "=== Release Artifacts ==="
          ls -lh final-artifacts/ || echo "(no artifacts found)"
          echo "HAS_FILES=${HAS_FILES}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AICQ ${{ github.ref_name }}"
          body: |
            ## AICQ ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | **Web** | `AICQ-${{ steps.version.outputs.VERSION }}-web.zip` | Static web client |
            | **Android** | `AICQ-${{ steps.version.outputs.VERSION }}-android-debug.apk` | Debug APK |
            | **Android** | `AICQ-${{ steps.version.outputs.VERSION }}-android-release.apk` | Release APK |
            | **Linux** | `AICQ-${{ steps.version.outputs.VERSION }}-linux.AppImage` | Linux AppImage |
            | **Windows** | `AICQ-${{ steps.version.outputs.VERSION }}-windows-setup.exe` | Windows installer |
            | **Windows** | `AICQ-${{ steps.version.outputs.VERSION }}-windows-x64.zip` | Windows portable |
            | **macOS** | `AICQ-${{ steps.version.outputs.VERSION }}-mac.dmg` | macOS DMG |

            ### Checksums
            Verify file integrity with the attached checksums file.

            ---
            *Built automatically by GitHub Actions*
          draft: false
          prerelease: false
          files: final-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICQ - AI Chat Server</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff;
}

.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
}

.logo {
  width: 100px;
  height: 100px;
  border-radius: 24px;
  background: linear-gradient(135deg, #2196F3, #1976D2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  font-weight: 800;
  letter-spacing: 2px;
  margin-bottom: 32px;
  box-shadow: 0 8px 32px rgba(33, 150, 243, 0.3);
}

h1 {
  font-size: 48px;
  font-weight: 800;
  letter-spacing: 4px;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #64B5F6, #2196F3, #BBDEFB);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 40px;
  font-weight: 300;
}

.status-card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 24px 40px;
  margin-bottom: 32px;
  backdrop-filter: blur(8px);
  min-width: 300px;
}

.status-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 16px;
}

.status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: inline-block;
}

.status-dot.online {
  background: #4CAF50;
  box-shadow: 0 0 12px rgba(76,175,80,0.6);
  animation: pulse 2s ease infinite;
}

.status-dot.offline {
  background: #F44336;
}

.status-dot.loading {
  background: #FF9800;
  animation: pulse 1s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.uptime {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  margin-top: 8px;
}

.admin-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  background: #2196F3;
  color: #fff;
  text-decoration: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 500;
  transition: all 0.2s ease;
  box-shadow: 0 4px 16px rgba(33,150,243,0.3);
}

.admin-link:hover {
  background: #1976D2;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33,150,243,0.4);
}

.admin-link:active {
  transform: translateY(0);
}

.arrow {
  font-size: 18px;
  transition: transform 0.2s ease;
}

.admin-link:hover .arrow {
  transform: translateX(4px);
}

.footer {
  padding: 20px;
  text-align: center;
  color: rgba(255,255,255,0.25);
  font-size: 13px;
}

.features {
  display: flex;
  gap: 24px;
  margin-top: 48px;
  flex-wrap: wrap;
  justify-content: center;
}

.feature {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  min-width: 140px;
  transition: all 0.2s ease;
}

.feature:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.12);
}

.feature .icon {
  font-size: 28px;
}

.feature .label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
}

@media (max-width: 600px) {
  h1 { font-size: 32px; }
  .subtitle { font-size: 15px; }
  .features { gap: 12px; }
  .feature { min-width: 100px; padding: 14px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">Q</div>
  <h1>AICQ</h1>
  <p class="subtitle">AI Chat Server</p>

  <div class="status-card">
    <div class="status-row">
      <span class="status-dot loading" id="statusDot"></span>
      <span id="statusText">正在检测服务器状态...</span>
    </div>
    <div class="uptime" id="uptimeText"></div>
  </div>

  <a href="admin.html" class="admin-link">
    管理面板 <span class="arrow">&rarr;</span>
  </a>

  <div class="features">
    <div class="feature">
      <span class="icon">&#128274;</span>
      <span class="label">端到端加密</span>
    </div>
    <div class="feature">
      <span class="icon">&#129302;</span>
      <span class="label">AI 代理</span>
    </div>
    <div class="feature">
      <span class="icon">&#128101;</span>
      <span class="label">群组聊天</span>
    </div>
    <div class="feature">
      <span class="icon">&#127760;</span>
      <span class="label">P2P 通信</span>
    </div>
  </div>
</div>

<div class="footer">
  AICQ Server &middot; Powered by aiohttp &amp; SQLite
</div>

<script>
(async function() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const uptime = document.getElementById('uptimeText');

  try {
    const resp = await fetch('/health');
    if (resp.ok) {
      const data = await resp.json();
      dot.className = 'status-dot online';
      text.textContent = '服务运行中';
      if (data.uptime !== undefined) {
        const hours = Math.floor(data.uptime / 3600);
        const minutes = Math.floor((data.uptime % 3600) / 60);
        uptime.textContent = '运行时间: ' + hours + ' 小时 ' + minutes + ' 分钟';
      }
    } else {
      dot.className = 'status-dot offline';
      text.textContent = '服务异常';
    }
  } catch {
    dot.className = 'status-dot offline';
    text.textContent = '无法连接到服务器';
  }
})();
</script>
</body>
</html>

version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: aicq-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    environment:
      CLICKHOUSE_DB: aicq
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: aicq123
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  aicq:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    container_name: aicq
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - PORT=61018
      - DOMAIN=aicq.online
      - AICQ_SERVER_URL=http://localhost:61018
      - MAX_FRIENDS=200
      - TEMP_NUMBER_TTL_HOURS=24
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=aicq123
      - CLICKHOUSE_DATABASE=aicq
    volumes:
      - aicq-data:/app/data
      - aicq-ssl:/etc/nginx/ssl
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:61018/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  clickhouse-data:
  clickhouse-logs:
  aicq-data:
  aicq-ssl:

version: '3.8'

services:
  aicq:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    container_name: aicq
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - PORT=61018
      - DOMAIN=aicq.online
      - AICQ_SERVER_URL=http://localhost:61018
      - MAX_FRIENDS=200
      - TEMP_NUMBER_TTL_HOURS=24
    volumes:
      - aicq-data:/app/data
      - aicq-ssl:/etc/nginx/ssl
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:61018/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  aicq-data:
  aicq-ssl:

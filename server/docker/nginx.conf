upstream aicq_server {
    server 127.0.0.1:61018;
}

upstream aicq_admin {
    server 127.0.0.1:80;
}

# ─── HTTP → HTTPS 重定向 ───────────────────────────────────────
server {
    listen 80;
    server_name aicq.online;
    return 301 https://$host$request_uri;
}

# ─── HTTPS 主入口 (监听 443) ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aicq.online;
    server_name aicq.online;

    # SSL certificates (use certbot for Let's Encrypt)
    ssl_certificate /etc/nginx/ssl/aicq.online.crt;
    ssl_certificate_key /etc/nginx/ssl/aicq.online.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ─── Admin panel (Next.js) ────────────────────────────
    location / {
        proxy_pass http://aicq_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ─── API proxy → Server ──────────────────────────────
    location /api/ {
        proxy_pass http://aicq_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # ─── Health check → Server ───────────────────────────
    location /health {
        proxy_pass http://aicq_server;
        proxy_http_version 1.1;
    }

    # ─── WebSocket → Server ──────────────────────────────
    location /ws {
        proxy_pass http://aicq_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

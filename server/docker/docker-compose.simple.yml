version: '3.8'

services:
  aicq-server:
    build:
      context: ../..
      dockerfile: server/Dockerfile.simple
    container_name: aicq-server
    restart: unless-stopped
    ports:
      - "61018:61018"
    environment:
      - NODE_ENV=production
      - PORT=61018
      - DOMAIN=aicq.online
      - JWT_SECRET=O3mzIMaj67WCi6cJ1NH8gREf7_5PPIU7UhgYoNlSoMp1bY_l7Gca6rXNJJ6cRHiF
      - MAX_FRIENDS=500
      - TEMP_NUMBER_TTL_HOURS=24
      - MAX_HTTP_CONNECTIONS=10000
      - MAX_WS_CONNECTIONS=20000
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:61018/health"]
      interval: 30s
      timeout: 10s
      retries: 3